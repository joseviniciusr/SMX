# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Install docs dependencies via requirements, then install the package so
# autoapi can resolve the SMX modules.
python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .

# Point Sphinx at the docs/ directory.
sphinx:
  builder: html
  configuration: docs/conf.py
