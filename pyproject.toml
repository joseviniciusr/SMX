[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smx"
version = "0.1.0"
description = "Spectral Model Explanation — interpretable, spectral-zone-level explanations for classification models trained on spectral data (XRF, Vis-NIR, etc.)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = ["spectroscopy", "explainability", "XRF", "machine-learning", "interpretability"]

dependencies = [
    "numpy>=1.24",
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "networkx>=3.0",
]

[project.optional-dependencies]
plotting = ["plotly>=5.0"]
dev = [
    "pytest>=7.0",
    "plotly>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["smx"]
